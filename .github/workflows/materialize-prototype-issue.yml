name: Materialize Prototype Issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  materialize:
    if: contains(github.event.issue.title, 'Prototype:')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Materialize prototype files
        id: materialize
        run: python scripts/materialize_prototype_issue.py

      - name: Commit prototype output
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No repo changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Materialize prototype issue #${{ github.event.issue.number }}"
          git push

      - name: Comment with prototype links
        uses: actions/github-script@v7
        with:
          script: |
            const runDir = `${{ steps.materialize.outputs.run_dir }}`;
            const previewUrl = `${{ steps.materialize.outputs.preview_url }}`;
            const body = [
              `Prototype materialised into \`${runDir}\` on \`main\`.`,
              "",
              `Preview: ${previewUrl}`,
              `Repo path: ${runDir}`,
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Reply in Slack thread
        if: ${{ secrets.SLACK_BOT_TOKEN != '' && steps.materialize.outputs.slack_channel != '' && steps.materialize.outputs.slack_thread_ts != '' }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ steps.materialize.outputs.slack_channel }}
          SLACK_THREAD_TS: ${{ steps.materialize.outputs.slack_thread_ts }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          PREVIEW_URL: ${{ steps.materialize.outputs.preview_url }}
          RUN_DIR: ${{ steps.materialize.outputs.run_dir }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          body = {
              "channel": os.environ["SLACK_CHANNEL"],
              "thread_ts": os.environ["SLACK_THREAD_TS"],
              "text": "\n".join(
                  [
                      "Prototype ready.",
                      f"Issue: {os.environ['ISSUE_URL']}",
                      f"Preview: {os.environ['PREVIEW_URL']}",
                      f"Repo path: {os.environ['RUN_DIR']}",
                  ]
              ),
          }

          request = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=json.dumps(body).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {os.environ['SLACK_BOT_TOKEN']}",
                  "Content-Type": "application/json; charset=utf-8",
              },
              method="POST",
          )

          with urllib.request.urlopen(request) as response:
              payload = json.loads(response.read().decode("utf-8"))

          if not payload.get("ok"):
              raise SystemExit(f"Slack completion reply failed: {payload}")
          PY
