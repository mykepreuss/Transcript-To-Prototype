<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knicks Tracker & Event Scheduler</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="dashboard">
    <header class="dashboard-header">
      <div class="header-meta">DATA OVERVIEW // V1.0</div>
      <h1 class="header-title">Knicks Tracker & Event Scheduler</h1>
      <p class="header-lede">Review upcoming scheduled fixtures and analyse recent scoring behaviour.</p>
    </header>

    <section class="telemetry-panel" id="telemetry-highlights">
      <!-- Highlights injected via JS -->
    </section>

    <div class="data-grid">
      <section class="data-module schedule-module">
        <div class="module-header">
          <h2>Upcoming Schedule</h2>
          <span class="module-desc">The next five fixtures to organise and prepare for.</span>
        </div>
        <div class="table-container" id="schedule-container">
          <!-- Table injected via JS -->
        </div>
      </section>

      <section class="data-module scoring-module">
        <div class="module-header">
          <h2>Scoring Trend</h2>
          <span class="module-desc">Points across the last five starts. Threshold: 30pts.</span>
        </div>
        <div class="chart-container" id="scoring-container">
          <!-- Bar chart injected via JS -->
        </div>
      </section>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
