<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knicks Tracker | V1 Local Execution</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="terminal">
        <header class="prompt-line">
            <span class="user">morgan@knicks-ops</span><span class="colon">:</span><span class="dir">~</span><span class="dollar">$</span>
            <span id="command-input" class="cmd"></span><span id="cursor" class="cursor"></span>
        </header>
        
        <main id="terminal-output" class="hidden">
            <!-- Output injected via app.js -->
        </main>
    </div>
    <script src="./app.js"></script>
</body>
</html>
